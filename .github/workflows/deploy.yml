# Build and deploy Astro site to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro site
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submit URLs to IndexNow
        run: |
          SITEMAP_URL="https://lucaberton.com/sitemap-index.xml"
          KEY="ce29c05385d649b690e22576d20cde14"

          URLS=$(curl -sL "$SITEMAP_URL" \
            | grep -oP '(?<=<loc>)[^<]+' \
            | while read sub; do
                curl -sL "$sub" | grep -oP '(?<=<loc>)[^<]+'
              done \
            | sort | tail -100)

          if [ -z "$URLS" ]; then
            echo "No URLs found in sitemap, skipping."
            exit 0
          fi

          URL_ARRAY=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')

          PAYLOAD=$(jq -n \
            --arg host "lucaberton.com" \
            --arg key "$KEY" \
            --arg keyLocation "https://lucaberton.com/${KEY}.txt" \
            --argjson urlList "$URL_ARRAY" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          echo "Submitting $(echo "$URL_ARRAY" | jq length) URLs to IndexNow..."

          for ENGINE in "api.indexnow.org" "www.bing.com"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://${ENGINE}/indexnow" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            echo "${ENGINE}: HTTP ${STATUS}"
          done
        continue-on-error: true
