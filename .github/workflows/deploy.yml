# Build and deploy Astro site to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check broken internal links
        run: node scripts/check-links.cjs

      - name: Build Astro site
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed URLs and submit to IndexNow
        run: |
          KEY="ce29c05385d649b690e22576d20cde14"
          SITE="https://lucaberton.com"

          # Get changed files in this commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          if [ -z "$CHANGED" ]; then
            echo "No changed files detected, submitting sitemap fallback."
            URLS=$(curl -sL "${SITE}/sitemap-index.xml" \
              | grep -oP '(?<=<loc>)[^<]+' \
              | while read sub; do curl -sL "$sub" | grep -oP '(?<=<loc>)[^<]+'; done \
              | sort | tail -100)
          else
            # Map changed files to URLs
            URLS=""
            # Always include homepage
            URLS="${SITE}/"

            # Blog posts
            echo "$CHANGED" | grep '^src/content/blog/.*\.mdx$' | while read f; do
              slug=$(basename "$f" .mdx)
              echo "${SITE}/blog/${slug}/"
            done >> /tmp/changed_urls.txt

            # Pages
            echo "$CHANGED" | grep '^src/pages/.*\.astro$' | while read f; do
              route=$(echo "$f" | sed 's|^src/pages/||;s|/index\.astro$||;s|\.astro$||')
              [ -n "$route" ] && echo "${SITE}/${route}/"
            done >> /tmp/changed_urls.txt

            # Components changed = resubmit recent posts
            if echo "$CHANGED" | grep -q '^src/components/'; then
              curl -sL "${SITE}/sitemap-index.xml" \
                | grep -oP '(?<=<loc>)[^<]+' \
                | while read sub; do curl -sL "$sub" | grep -oP '(?<=<loc>)[^<]+'; done \
                | sort | tail -50 >> /tmp/changed_urls.txt
            fi

            echo "${SITE}/" >> /tmp/changed_urls.txt
            URLS=$(sort -u /tmp/changed_urls.txt 2>/dev/null)
          fi

          if [ -z "$URLS" ]; then
            echo "No URLs to submit."
            exit 0
          fi

          URL_COUNT=$(echo "$URLS" | wc -l)
          echo "Submitting ${URL_COUNT} URLs to IndexNow..."
          echo "$URLS" | head -10
          [ "$URL_COUNT" -gt 10 ] && echo "... and $((URL_COUNT - 10)) more"

          URL_ARRAY=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')

          PAYLOAD=$(jq -n \
            --arg host "lucaberton.com" \
            --arg key "$KEY" \
            --arg keyLocation "${SITE}/${KEY}.txt" \
            --argjson urlList "$URL_ARRAY" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          for ENGINE in "api.indexnow.org" "www.bing.com"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://${ENGINE}/indexnow" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            echo "${ENGINE}: HTTP ${STATUS}"
          done
        continue-on-error: true
