pages:
  image: node:lts

  before_script:
    - npm ci

  script:
    - npm run build

  after_script:
    # IndexNow - notify search engines of updated pages
    - |
      if [ -f public/sitemap-0.xml ]; then
        URLS=$(grep -oP '<loc>\K[^<]+' public/sitemap-0.xml | head -100 | jq -R . | jq -s .)
        curl -s -X POST "https://api.indexnow.org/indexnow" \
          -H "Content-Type: application/json" \
          -d "{
            \"host\": \"lucaberton.com\",
            \"key\": \"ce29c05385d649b690e22576d20cde14\",
            \"keyLocation\": \"https://lucaberton.com/ce29c05385d649b690e22576d20cde14.txt\",
            \"urlList\": $URLS
          }" || true
        echo "IndexNow: submitted $(echo $URLS | jq length) URLs"
      fi

  artifacts:
    paths:
      - public

  only:
    - main