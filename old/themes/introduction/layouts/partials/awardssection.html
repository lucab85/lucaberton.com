<div class="container"><!-- Begin Awards container -->

<h2 class="title is-2 has-text-centered">{{ i18n "Latest Awards" }}</h2>
    {{ range first 1 (where .Data.Pages.ByPublishDate "Section" "awards") }} 
    <div class="summary">{{ .Date.Format .Site.Params.dateform }}
        <h3 class="title is-3 latest-post-title">{{ .Title }}</h3>
            <div class="markdown">
            {{ .Summary }}
            </div>
    </div>
    {{ end }}

</div><!-- End Awards container -->

<div class="container has-text-centered top-pad"><a href="#top"><i class="fa fa-arrow-up"></i></a></div>
