<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="refresh" content="0; url=https://lucaberton.com">
    <title>Redirecting...</title>
    <script>
        // Force redirect to HTTPS
        if (window.location.protocol === 'http:' || window.location.hostname === 'www.lucaberton.com') {
            window.location.replace('https://lucaberton.com' + window.location.pathname + window.location.search);
        }
    </script>
</head>
<body>
    <p>If you are not redirected automatically, <a href="https://lucaberton.com">click here</a>.</p>
</body>
</html>
